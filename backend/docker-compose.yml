services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: yourskills
      POSTGRES_USER: yourskills
      POSTGRES_PASSWORD: yourskills
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      YOURSKILLS_DATABASE_URL: postgresql+psycopg://yourskills:yourskills@postgres:5432/yourskills
      YOURSKILLS_TOKEN_PEPPER: dev-pepper-change-me
    depends_on:
      - postgres

volumes:
  pgdata:
