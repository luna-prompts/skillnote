name: Docker Images

on:
  push:
    tags:
      - 'v*.*.*'
      - 'cli-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.5.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          # API image must build from repo root so it can include the
          # plugin-openclaw/ and plugin/ sibling dirs that the setup endpoints
          # package on demand.
          - name: api
            context: .
            dockerfile: backend/Dockerfile
          - name: web
            context: .
            dockerfile: Dockerfile
            build_args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8082
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/cli-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/cli-v}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/luna-prompts/skillnote-${{ matrix.image.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          build-args: ${{ matrix.image.build_args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          platforms: linux/amd64,linux/arm64
