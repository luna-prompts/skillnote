name: CLI PR

on:
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-pr.yml'
  push:
    branches: [master]
    paths:
      - 'cli/**'

defaults:
  run:
    working-directory: cli

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        with:
          files: cli/coverage/lcov.info
          flags: cli
          fail_ci_if_error: false

  pack-check:
    name: npm pack dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run
      - name: Verify bin is executable
        run: |
          test -x dist/index.js && echo "✓ bin executable"
