name: Homebrew Tap

# Bump the skillnote Homebrew formula in luna-prompts/homebrew-tap on
# every release. Triggered by the same tag (cli-v*) that fires the npm
# publish + Docker image workflows — sequencing matters: this workflow
# downloads from the npm registry, so it must run *after* CLI Release
# has finished pushing the new version. The `needs:` chain isn't
# available across separate workflows; instead the job waits-and-polls
# for the tarball to be visible on registry.npmjs.org before computing
# its sha256.
#
# Required secret:
#   HOMEBREW_TAP_PAT — fine-grained PAT with `contents: write` on
#   luna-prompts/homebrew-tap. Other scopes not needed.

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to publish (e.g. 0.5.3). Leave blank to derive from the tag.'
        required: false

permissions:
  contents: read

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip 'cli-v' prefix from the tag → bare semver.
            VERSION="${GITHUB_REF_NAME#cli-v}"
          fi
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "::error::Could not resolve version from tag '$GITHUB_REF_NAME' or inputs."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Wait for npm tarball to be reachable
        id: wait
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # npm propagation is usually < 60s after `npm publish`, but
          # the CLI Release workflow can take a few extra seconds to
          # finalize. Poll for up to 5 minutes.
          URL="https://registry.npmjs.org/skillnote/-/skillnote-${VERSION}.tgz"
          echo "Polling $URL"
          for i in $(seq 1 30); do
            if curl -fsI "$URL" -o /dev/null; then
              echo "Tarball available after ${i}0s."
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "::error::npm tarball never became reachable: $URL"
          exit 1

      - name: Compute sha256
        id: sha
        env:
          URL: ${{ steps.wait.outputs.url }}
        run: |
          TMP=$(mktemp)
          curl -fsSL "$URL" -o "$TMP"
          SHA=$(sha256sum "$TMP" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha256: $SHA"
          rm -f "$TMP"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: luna-prompts/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Write formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          URL: ${{ steps.wait.outputs.url }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/skillnote.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # Auto-generated by .github/workflows/homebrew-tap.yml in luna-prompts/skillnote.
          # Do not edit by hand — changes will be overwritten on the next release.
          class Skillnote < Formula
            desc "Self-hosted skill registry for AI coding agents"
            homepage "https://github.com/luna-prompts/skillnote"
            url "${URL}"
            sha256 "${SHA}"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *Language::Node.std_npm_args(prefix: libexec)
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/skillnote --version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
          URL: ${{ steps.wait.outputs.url }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          git config user.name "skillnote-release-bot"
          git config user.email "release-bot@luna-prompts.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Formula already at ${VERSION}. Nothing to commit."
            exit 0
          fi

          git add Formula/skillnote.rb
          git commit -m "skillnote ${VERSION}

          Published from luna-prompts/skillnote@${GITHUB_REF_NAME}.
          Tarball: ${URL}
          sha256:  ${SHA}"
          git push
