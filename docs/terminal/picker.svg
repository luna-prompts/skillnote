<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .chrome { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .title { fill: #8b949e; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .box { fill: none; stroke: #30363d; stroke-width: 1; }
      .box-active { fill: none; stroke: #58a6ff; stroke-width: 1; }
      .heading { fill: #58a6ff; font: bold 14px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; letter-spacing: 3px; }
      .sub { fill: #8b949e; font: 11px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .label { fill: #8b949e; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .selected { fill: #e6edf3; font: bold 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .item { fill: #8b949e; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .dim { fill: #484f58; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .accent { fill: #58a6ff; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .count { fill: #7ee787; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .skill { fill: #e6edf3; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .skilldesc { fill: #484f58; font: 11px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .highlight-bg { fill: #1f6feb; opacity: 0.15; }
      .footer { fill: #484f58; font: 11px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .orange { fill: #d29922; font: bold 14px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .x { fill: #8b949e; font: bold 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
  </defs>
  <!-- Window -->
  <rect class="bg" width="720" height="440" rx="10" />
  <rect class="chrome" width="720" height="38" rx="10" />
  <rect class="bg" x="0" y="28" width="720" height="10" />
  <rect class="border" x="0.5" y="0.5" width="719" height="439" rx="10" />
  <!-- Dots -->
  <circle class="dot-r" cx="20" cy="19" r="6" />
  <circle class="dot-y" cx="40" cy="19" r="6" />
  <circle class="dot-g" cx="60" cy="19" r="6" />
  <text class="title" x="340" y="23" text-anchor="middle">~ &mdash; claude</text>

  <!-- Header: Clawd x SkillNote -->
  <text class="orange" x="220" y="72">\</text>
  <text class="orange" x="226" y="72">&#x203E;&#x203E;\</text>
  <text class="x" x="280" y="72">&#xD7;</text>
  <text class="heading" x="300" y="72">S K I L L N O T E</text>

  <!-- Search box -->
  <rect class="box" x="60" y="88" width="600" height="28" rx="4" />
  <text class="dim" x="72" y="107">Search collections...</text>

  <!-- Two-column layout -->
  <!-- Left: Collections -->
  <rect class="box" x="60" y="126" width="290" height="250" rx="4" />
  <text class="label" x="72" y="148">COLLECTIONS</text>

  <!-- Selected item highlight -->
  <rect class="highlight-bg" x="61" y="158" width="288" height="28" rx="2" />
  <text class="accent" x="76" y="177">&#x25B8;</text>
  <text class="selected" x="92" y="177">Conventions</text>
  <text class="count" x="290" y="177">4 skills</text>

  <text class="dim" x="80" y="205"> </text>
  <text class="item" x="92" y="205">DevOps</text>
  <text class="dim" x="290" y="205">2 skills</text>

  <text class="dim" x="80" y="233"> </text>
  <text class="item" x="92" y="233">Official</text>
  <text class="dim" x="290" y="233">2 skills</text>

  <!-- Right: Skills preview -->
  <rect class="box" x="370" y="126" width="290" height="250" rx="4" />
  <text class="label" x="382" y="148">SKILLS IN CONVENTIONS</text>

  <text class="skill" x="390" y="175">1. code-review-checklist</text>
  <text class="skilldesc" x="390" y="192">Structured code review checklist</text>

  <text class="skill" x="390" y="220">2. error-handling</text>
  <text class="skilldesc" x="390" y="237">Standard error handling patterns</text>

  <text class="skill" x="390" y="265">3. git-commit-convention</text>
  <text class="skilldesc" x="390" y="282">Conventional commit message format</text>

  <text class="skill" x="390" y="310">4. testing-guide</text>
  <text class="skilldesc" x="390" y="327">Testing best practices and patterns</text>

  <!-- Footer -->
  <line x1="60" y1="395" x2="660" y2="395" stroke="#30363d" stroke-width="1" />
  <text class="footer" x="72" y="415">&#x2191;&#x2193; navigate</text>
  <text class="footer" x="200" y="415">Enter select</text>
  <text class="footer" x="340" y="415">/ search</text>
  <text class="footer" x="450" y="415">q quit</text>
</svg>
