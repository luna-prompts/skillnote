<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .chrome { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .title { fill: #8b949e; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .prompt { fill: #7ee787; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .cmd { fill: #e6edf3; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .dim { fill: #484f58; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .info { fill: #8b949e; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .success { fill: #7ee787; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .warn { fill: #d29922; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .brand { fill: #58a6ff; font: bold 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
  </defs>
  <!-- Window -->
  <rect class="bg" width="720" height="380" rx="10" />
  <rect class="chrome" width="720" height="38" rx="10" />
  <rect class="bg" x="0" y="28" width="720" height="10" />
  <rect class="border" x="0.5" y="0.5" width="719" height="379" rx="10" />
  <!-- Dots -->
  <circle class="dot-r" cx="20" cy="19" r="6" />
  <circle class="dot-y" cx="40" cy="19" r="6" />
  <circle class="dot-g" cx="60" cy="19" r="6" />
  <text class="title" x="340" y="23" text-anchor="middle">~ &mdash; bash</text>
  <!-- Content -->
  <text class="prompt" x="24" y="65">$</text>
  <text class="cmd" x="40" y="65">curl -sf http://localhost:8082/setup | bash</text>
  <text y="95">
    <tspan class="brand" x="24">  SkillNote</tspan>
    <tspan class="dim"> v0.3.0</tspan>
  </text>
  <text class="info" x="24" y="125">  Installing Claude Code plugin...</text>
  <text class="dim" x="24" y="150">  Downloading plugin.zip</text>
  <text class="dim" x="24" y="170">  Registering with Claude Code CLI</text>
  <text class="dim" x="24" y="190">  Configuring 6 lifecycle hooks</text>
  <text class="dim" x="24" y="210">  Setting up shell wrapper</text>
  <text class="dim" x="24" y="230">  Writing ~/.skillnote/host</text>
  <text class="success" x="24" y="260">  &#x2713; Plugin installed to ~/.claude/plugins/skillnote</text>
  <text class="success" x="24" y="280">  &#x2713; Shell wrapper added to ~/.zshrc</text>
  <text class="success" x="24" y="300">  &#x2713; Status line configured</text>
  <text class="warn" x="24" y="330">  Next: source ~/.zshrc &amp;&amp; claude</text>
  <text class="prompt" x="24" y="360">$</text>
  <text class="cmd" x="40" y="360">&#x2588;</text>
</svg>
