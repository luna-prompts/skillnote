<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .chrome { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .title { fill: #8b949e; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .brand { fill: #58a6ff; font: bold 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .dim { fill: #484f58; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .info { fill: #8b949e; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .white { fill: #e6edf3; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .success { fill: #7ee787; font: 13px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .card-border { fill: none; stroke: #30363d; stroke-width: 1; rx: 4; }
      .num { fill: #58a6ff; font: bold 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .skillname { fill: #e6edf3; font: 12px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .path { fill: #484f58; font: 11px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .statusline-bg { fill: #161b22; }
      .statusline { fill: #58a6ff; font: bold 11px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
      .statusdim { fill: #8b949e; font: 11px 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
  </defs>
  <!-- Window -->
  <rect class="bg" width="720" height="340" rx="10" />
  <rect class="chrome" width="720" height="38" rx="10" />
  <rect class="bg" x="0" y="28" width="720" height="10" />
  <rect class="border" x="0.5" y="0.5" width="719" height="339" rx="10" />
  <!-- Dots -->
  <circle class="dot-r" cx="20" cy="19" r="6" />
  <circle class="dot-y" cx="40" cy="19" r="6" />
  <circle class="dot-g" cx="60" cy="19" r="6" />
  <text class="title" x="340" y="23" text-anchor="middle">~ &mdash; claude</text>

  <!-- Sync splash -->
  <text class="brand" x="24" y="64">  &#x2726; S K I L L N O T E</text>
  <text class="dim" x="240" y="64">Conventions</text>

  <!-- Skill cards box -->
  <rect class="card-border" x="24" y="78" width="672" height="120" />

  <text class="num" x="40" y="100">1.</text>
  <text class="skillname" x="62" y="100">code-review-checklist</text>
  <text class="num" x="360" y="100">2.</text>
  <text class="skillname" x="382" y="100">error-handling</text>

  <text class="num" x="40" y="125">3.</text>
  <text class="skillname" x="62" y="125">git-commit-convention</text>
  <text class="num" x="360" y="125">4.</text>
  <text class="skillname" x="382" y="125">testing-guide</text>

  <line x1="40" y1="142" x2="680" y2="142" stroke="#30363d" stroke-width="1" stroke-dasharray="2,3" />
  <text class="path" x="40" y="160">~/.claude/skills/skillnote-*/SKILL.md</text>
  <text class="success" x="480" y="160">4 skills synced</text>
  <text class="dim" x="580" y="160">(all current)</text>

  <!-- Claude prompt area -->
  <text class="info" x="24" y="225">claude&gt;</text>
  <text class="white" x="100" y="225">help me review this pull request</text>

  <text class="dim" x="24" y="252">  Claude reads skill descriptions from ~/.claude/skills/</text>
  <text class="dim" x="24" y="272">  &#x2192; Auto-triggers 'code-review-checklist' based on description match</text>
  <text class="dim" x="24" y="292">  &#x2192; allowed-tools: Read, Grep enforced by Claude Code</text>

  <!-- Status line -->
  <rect class="statusline-bg" x="0" y="310" width="720" height="30" rx="0" />
  <rect x="0" y="310" width="720" height="1" fill="#30363d" />
  <text class="statusline" x="24" y="330">&#x25CF; S K I L L N O T E</text>
  <text class="statusdim" x="200" y="330">&#x2502;</text>
  <text class="statusdim" x="215" y="330">Conventions</text>
  <text class="statusdim" x="325" y="330">&#x2502;</text>
  <text class="statusdim" x="340" y="330">4 skills</text>
  <text class="statusdim" x="420" y="330">&#x2502;</text>
  <text class="statusdim" x="435" y="330">localhost:8082</text>
</svg>
