# SkillNote — standalone docker-compose for self-hosting
#
# For users who want to run SkillNote with Docker directly (no Node / npx).
# Pinned to v0.5.0; bump the image tags below to upgrade.
#
# Usage:
#   curl -fsSL https://raw.githubusercontent.com/luna-prompts/skillnote/master/deploy/docker-compose.yml -o docker-compose.yml
#   docker compose up -d
#
# Web UI:  http://localhost:3000
# API:     http://localhost:8082
# Health:  http://localhost:8082/health
#
# To override host/ports, set env vars BEFORE `docker compose up`:
#   SKILLNOTE_HOST=<machine-ip>  SKILLNOTE_WEB_PORT=3000  SKILLNOTE_API_PORT=8082
#
# To bind to your LAN so other devices can reach the UI:
#   SKILLNOTE_HOST=<your-lan-ip> docker compose up -d

name: skillnote

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: skillnote
      POSTGRES_USER: skillnote
      POSTGRES_PASSWORD: skillnote
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillnote"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ghcr.io/luna-prompts/skillnote-api:0.5.0
    environment:
      SKILLNOTE_DATABASE_URL: postgresql+psycopg://skillnote:skillnote@postgres:5432/skillnote
      SKILLNOTE_BUNDLE_STORAGE_DIR: /app/data/bundles
      SKILLNOTE_CORS_ORIGINS: "http://${SKILLNOTE_HOST:-localhost}:${SKILLNOTE_WEB_PORT:-3000},http://localhost:${SKILLNOTE_WEB_PORT:-3000},http://127.0.0.1:${SKILLNOTE_WEB_PORT:-3000}"
    ports:
      - "${SKILLNOTE_API_PORT:-8082}:8080"
    volumes:
      - bundles:/app/data/bundles
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    command: >
      sh -c "python scripts/wait_for_db.py &&
             alembic upgrade head &&
             python scripts/seed_data.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080"
    restart: unless-stopped

  web:
    image: ghcr.io/luna-prompts/skillnote-web:0.5.0
    ports:
      - "${SKILLNOTE_WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: "http://${SKILLNOTE_HOST:-localhost}:${SKILLNOTE_API_PORT:-8082}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  bundles:
